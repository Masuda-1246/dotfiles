"$schema" = "https://starship.rs/config-schema.json"

format = """
$directory\
$git_branch\
$git_status\
$fill\
$nodejs\
$python\
$golang\
$deno\
$terraform\
$kubernetes\
$docker_context\
$cmd_duration\
$line_break\
$character"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[fill]
symbol = " "

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 3_000
style = "bold yellow"
format = "[$duration]($style) "

[nodejs]
symbol = " "
format = "[$symbol$version]($style) "

[python]
symbol = " "
format = "[$symbol$version]($style) "

[golang]
symbol = " "
format = "[$symbol$version]($style) "

[deno]
symbol = "🦕 "
format = "[$symbol$version]($style) "

[terraform]
symbol = "💠 "
format = "[$symbol$version]($style) "

[kubernetes]
disabled = false
symbol = "☸ "
format = "[$symbol$context(/$namespace)]($style) "

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "

[aws]
disabled = true

[gcloud]
disabled = true

[package]
disabled = true
