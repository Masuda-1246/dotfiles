[settings]
# サプライチェーン攻撃対策: リリースから7日未満のバージョンをインストールしない
install_before = "7d"
# ロックファイルを有効化して再現性を確保
lockfile = true
# npm バックエンドの内部パッケージマネージャを pnpm に強制
# npm:xxx のインストール時に pnpm が使われる（npm は一切使わない）
npm.package_manager = "pnpm"

[tools]
# ── Language Runtimes ──
node = "22"
python = "3.12"
go = "latest"
deno = "latest"

# ── Package Managers ──
pnpm = "latest"
uv = "latest"

# ── DevOps / Cloud ──
terraform = "latest"
kubectl = "latest"
helm = "latest"
eksctl = "latest"
awscli = "latest"
supabase = "latest"

# ── Dev Tools ──
# NOTE: gh は aqua バックエンドの attestation 問題あり。mise アップデート後に再試行。
#   現在は Homebrew 版を使用: brew install gh
starship = "latest"
direnv = "latest"
fzf = "latest"
ripgrep = "latest"
lefthook = "latest"
git-lfs = "latest"

# ── Proto / gRPC ──
protoc = "latest"
protoc-gen-go = "latest"
protoc-gen-go-grpc = "latest"
grpcurl = "latest"

# ── SaaS CLIs ──
stripe = "latest"

# ── npm CLIs (内部で pnpm を使用) ──
"npm:aws-cdk" = "2"
"npm:prisma" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"

# NOTE: neovim, tmux は Homebrew で管理 (Brewfile)
# NOTE: yabai, skhd は Homebrew tap で管理 (Brewfile)
# NOTE: @openai/codex は install_before フィルタとの干渉があるため pnpm -g で管理
#   pnpm add -g @openai/codex

[env]
# mise管理のpnpmをデフォルトに
COREPACK_ENABLE_STRICT = "0"

# ── Window Manager (yabai + skhd) ──

[tasks."wm:start"]
description = "yabai + skhd を起動"
run = ["yabai --start-service", "skhd --start-service"]

[tasks."wm:stop"]
description = "yabai + skhd を停止"
run = ["yabai --stop-service", "skhd --stop-service"]

[tasks."wm:restart"]
description = "yabai + skhd を再起動"
run = ["yabai --restart-service", "skhd --restart-service"]

[tasks."yabai:start"]
description = "yabai を起動"
run = "yabai --start-service"

[tasks."yabai:stop"]
description = "yabai を停止"
run = "yabai --stop-service"

[tasks."yabai:restart"]
description = "yabai を再起動"
run = "yabai --restart-service"

[tasks."skhd:start"]
description = "skhd を起動"
run = "skhd --start-service"

[tasks."skhd:stop"]
description = "skhd を停止"
run = "skhd --stop-service"

[tasks."skhd:restart"]
description = "skhd を再起動"
run = "skhd --restart-service"
